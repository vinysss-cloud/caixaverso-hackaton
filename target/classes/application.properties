quarkus.application.name=caixa-pcd-game-training
quarkus.http.port=8080

# =====================================================
# BANCO H2 LOCAL - PROTÓTIPO / HACKATHON
# Não utiliza dados reais.
# Credenciais fixas apenas para ambiente local.
# =====================================================
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:file:./data/caixaverso-db;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
quarkus.datasource.username=sa
quarkus.datasource.password=

# =====================================================
# HIBERNATE
# update mantém as tabelas e atualiza o schema quando necessário.
# Para alterações estruturais grandes no H2 local, apague a pasta ./data.
# =====================================================
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false

# =====================================================
# COOKIE LOCAL
# Em produção, Secure deve ser true e rodar com HTTPS.
# Para protótipo local em HTTP, precisa ser false.
# =====================================================
caixaverso.cookie.secure=false

# =====================================================
# PERFIL DE TESTE
# Usa banco em memória para não depender do banco local.
# =====================================================
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:caixaverso-test;DB_CLOSE_DELAY=-1
%test.quarkus.datasource.username=sa
%test.quarkus.datasource.password=
%test.quarkus.hibernate-orm.database.generation=drop-and-create
%test.caixaverso.cookie.secure=false

# =====================================================
# LOGS - CONSOLE + ARQUIVO LOCAL
# Estrutura pensada para protótipo com rastreabilidade.
# Não registrar senha, token, cookie, CSRF ou dados reais.
# =====================================================
quarkus.log.level=INFO
quarkus.log.console.enable=true
quarkus.log.console.level=INFO
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss} %-5p [%c{2.}] [%X{requestId}] %m%n

quarkus.log.file.enable=true
quarkus.log.file.level=DEBUG
quarkus.log.file.path=logs/caixaverso-assistivo.log
quarkus.log.file.format=%d{yyyy-MM-dd HH:mm:ss} %-5p [%c{2.}] [%X{requestId}] (%t) %m%n
quarkus.log.file.rotation.max-file-size=10M
quarkus.log.file.rotation.max-backup-index=5

# Categorias do projeto
quarkus.log.category."br.gov.caixa.treinamento".level=INFO
quarkus.log.category."br.gov.caixa.treinamento.access".level=INFO
quarkus.log.category."br.gov.caixa.treinamento.audit".level=INFO
quarkus.log.category."br.gov.caixa.treinamento.security".level=INFO
quarkus.log.category."br.gov.caixa.treinamento.service".level=INFO
quarkus.log.category."br.gov.caixa.treinamento.repository".level=INFO
quarkus.log.category."br.gov.caixa.treinamento.controller".level=INFO

# Reduz ruído de bibliotecas
quarkus.log.category."org.hibernate".level=WARN
quarkus.log.category."io.quarkus".level=INFO
quarkus.log.category."io.agroal".level=WARN

# JSON em produção, mantendo console legível no dev.
quarkus.log.console.json=false
%prod.quarkus.log.console.json=true
%prod.quarkus.log.console.json.additional-field."app".value=caixaverso-assistivo
%prod.quarkus.log.console.json.additional-field."ambiente".value=producao

# Evita geração de arquivo de log durante testes unitários.
%test.quarkus.log.file.enable=false
%test.quarkus.log.console.level=WARN
