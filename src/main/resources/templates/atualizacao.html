<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Nova Funcionalidade</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav class="topnav" role="navigation" aria-label="Menu principal">
    <div class="brand"><span class="brand-symbol" aria-hidden="true"></span><span style="margin-left:0.5rem;font-weight:900;color:#fff">CaixaVerso</span></div>
    <div class="nav-links"><a href="/home">Início</a><a href="/treinamento">Treinamento Guiado</a><a href="/desafio">Modo Desafio</a><a href="/atualizacao">Nova Funcionalidade</a><a href="/dashboard">Dashboard</a></div>
    <a class="nav-action" href="/logout">Sair</a>
</nav>

<main class="container">
    <header class="mission-panel">
      <h1 class="hero-title">Nova Funcionalidade</h1>
      <p class="hero-subtitle">{modulo.resumo}</p>
    </header>

    <section class="card" style="margin-top:1rem">
        <h2>{modulo.nome}</h2>

        <h3 style="margin-top:0.8rem">Linha do tempo</h3>
        <ol class="timeline">
            {#for passo in modulo.passos}
            <li class="timeline-item">{passo}</li>
            {/for}
        </ol>

        <div style="display:flex;gap:0.6rem;margin-top:0.8rem">
            <a href="/treinamento" id="iniciar-atualizacao" class="btn-primary">Iniciar simulação</a>
            <a href="/dashboard" class="btn">Ver impacto no dashboard</a>
        </div>
    </section>
</main>

<script src="/js/app.js"></script>
</body>
</html>
